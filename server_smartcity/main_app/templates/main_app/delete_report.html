{% extends 'base.html' %}

{% block title %}Hapus Laporan{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'landing' %}">Home</a></li>
        <li class="breadcrumb-item"><a href="{% url 'report_list' %}">Reports</a></li>
        <li class="breadcrumb-item active" aria-current="page">Hapus</li>
    </ol>
</nav>

<div class="card">
    <div class="card-body p-4 text-center">
        <span class="icon-chip bg-danger-subtle text-danger mb-3">
            <i class="bi bi-exclamation-triangle"></i>
        </span>
        <h2 class="section-heading h4 mb-2 text-danger">Hapus Laporan</h2>
        <p class="text-muted mb-2">Apakah yakin ingin menghapus laporan ini?</p>
        <p class="fw-bold fs-5">{{ object.title }}</p>

        <form method="post" class="loading-form">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger loading-btn"
                    onclick="return confirm('Yakin ingin menghapus laporan ini?')">
                Ya, Hapus
            </button>
            <a href="{% url 'report_list' %}" class="btn btn-outline-secondary">Batal</a>
        </form>
    </div>
</div>
{% endblock %}
