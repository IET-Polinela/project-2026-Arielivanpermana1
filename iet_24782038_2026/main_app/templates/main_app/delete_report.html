{% extends 'base.html' %}

{% block title %}Hapus Laporan{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'landing' %}">Home</a></li>
        <li class="breadcrumb-item"><a href="{% url 'report_list' %}">Reports</a></li>
        <li class="breadcrumb-item active" aria-current="page">Hapus</li>
    </ol>
</nav>

<div class="card shadow-sm border-0 rounded-4">
    <div class="card-body p-4 text-center">
        <h2 class="mb-3 text-danger">Hapus Laporan</h2>
        <p>Apakah yakin ingin menghapus laporan ini?</p>
        <p class="fw-bold">{{ object.title }}</p>

        <form method="post" class="loading-form">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger loading-btn"
                    onclick="return confirm('Yakin ingin menghapus laporan ini?')">
                Ya, Hapus
            </button>
            <a href="{% url 'report_list' %}" class="btn btn-secondary">Batal</a>
        </form>
    </div>
</div>
{% endblock %}
