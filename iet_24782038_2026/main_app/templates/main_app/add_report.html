{% extends 'base.html' %}

{% block title %}Tambah Laporan{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'landing' %}">Home</a></li>
        <li class="breadcrumb-item"><a href="{% url 'report_list' %}">Reports</a></li>
        <li class="breadcrumb-item active" aria-current="page">Tambah Laporan</li>
    </ol>
</nav>

<div class="card shadow-sm border-0 rounded-4">
    <div class="card-body p-4">
        <h2 class="mb-4">Tambah Laporan</h2>

        <form method="post" class="loading-form">
            {% csrf_token %}

            <div class="mb-3">
                <label for="id_title" class="form-label">Title</label>
                {{ form.title }}
            </div>

            <div class="mb-3">
                <label for="id_category" class="form-label">Category</label>
                {{ form.category }}
            </div>

            <div class="mb-3">
                <label for="id_description" class="form-label">Description</label>
                {{ form.description }}
            </div>

            <div class="mb-3">
                <label for="id_location" class="form-label">Location</label>
                {{ form.location }}
            </div>

            <button type="submit" class="btn btn-primary loading-btn">Submit</button>
            <a href="{% url 'report_list' %}" class="btn btn-secondary">Kembali</a>
        </form>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll("input, textarea, select").forEach(el => {
        el.classList.add("form-control");
    });
});
</script>
{% endblock %}
