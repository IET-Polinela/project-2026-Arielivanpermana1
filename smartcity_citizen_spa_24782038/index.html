<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        IET City Portal
    </title>

    <!-- ====================================== -->
    <!-- BOOTSTRAP CSS -->
    <!-- ====================================== -->

    <link

        href="
        https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css
        "

        rel="stylesheet"
    >

    <!-- ====================================== -->
    <!-- BOOTSTRAP ICON -->
    <!-- ====================================== -->

    <link

        href="
        https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css
        "

        rel="stylesheet"
    >

    <!-- ====================================== -->
    <!-- CUSTOM STYLE -->
    <!-- ====================================== -->

    <style>

        :root {
            --ink: #182230;
            --muted: #667085;
            --line: #d9e2ec;
            --canvas: #f5f7fb;
            --surface: #ffffff;
            --primary: #0f5b8d;
            --primary-dark: #0b3d61;
            --accent: #157f72;
            --warning: #d9922e;
        }

        body {
            min-height: 100vh;
            background: var(--canvas);
            color: var(--ink);
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .navbar.bg-primary {
            background: var(--primary-dark) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }

        .navbar-brand {
            font-size: 1.18rem;
            letter-spacing: 0;
        }

        .brand-mark,
        .icon-chip {
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .brand-mark {
            background: rgba(255, 255, 255, 0.14);
            color: #ffffff;
        }

        .portal-panel,
        .report-card,
        .auth-card,
        .modal-content {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 12px 30px rgba(24, 34, 48, 0.07);
        }

        .btn {
            border-radius: 8px;
            font-weight: 650;
        }

        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
        }

        .btn-primary:hover {
            background: #0c4c76;
            border-color: #0c4c76;
        }

        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }

        .btn-outline-primary:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .form-control {
            border-color: var(--line);
            border-radius: 8px;
            padding: 0.72rem 0.85rem;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(15, 91, 141, 0.14);
        }

        .progress {
            height: 8px;
            border-radius: 8px;
            background: #e6edf3;
        }

        .progress-bar {
            border-radius: 8px;
        }

        .report-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .report-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 34px rgba(24, 34, 48, 0.1);
        }

        .modal-header.bg-primary {
            background: var(--primary-dark) !important;
        }

        .summary-row {
            border-bottom: 1px solid var(--line);
            padding: 0.65rem 0;
        }

        .summary-row:last-child {
            border-bottom: 0;
        }

        .text-muted {
            color: var(--muted) !important;
        }

        .min-vh-75 {
            min-height: 75vh;
        }

        .is-login-page {
            background: #71b8ee;
        }

        .is-login-page main {
            padding-top: 0 !important;
            padding-bottom: 0 !important;
        }

        .is-login-page .navbar {
            box-shadow: none !important;
        }

        .is-login-page .navbar .ms-auto {
            display: none;
        }

        .login-stage {
            min-height: calc(100vh - 64px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
            position: relative;
            overflow: hidden;
        }

        .login-stage::before,
        .login-stage::after {
            content: "";
            position: absolute;
            pointer-events: none;
            opacity: 0.24;
        }

        .login-stage::before {
            inset: 0 auto auto -12%;
            width: 42%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.46), rgba(255, 255, 255, 0));
            transform: skewX(-18deg);
        }

        .login-stage::after {
            inset: auto -10% -16% auto;
            width: 52%;
            height: 54%;
            background: linear-gradient(135deg, rgba(11, 61, 97, 0.2), rgba(255, 255, 255, 0.08));
            transform: skewX(-22deg);
        }

        .login-shell {
            width: min(1120px, 100%);
            min-height: 560px;
            display: grid;
            grid-template-columns: 1.05fr 0.95fr;
            align-items: center;
            gap: 2rem;
            background:
                linear-gradient(135deg, rgba(11, 61, 97, 0.96), rgba(15, 91, 141, 0.92)),
                linear-gradient(45deg, rgba(255, 255, 255, 0.08), transparent);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 8px;
            box-shadow: 0 28px 58px rgba(11, 61, 97, 0.28);
            padding: 3rem;
            position: relative;
            overflow: hidden;
        }

        .login-shell::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(120deg, transparent 0 38%, rgba(255, 255, 255, 0.08) 38% 40%, transparent 40% 100%),
                linear-gradient(35deg, transparent 0 58%, rgba(255, 255, 255, 0.07) 58% 60%, transparent 60% 100%);
            pointer-events: none;
        }

        .login-visual,
        .login-card {
            position: relative;
            z-index: 1;
        }

        .login-visual {
            color: #ffffff;
        }

        .login-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.48rem 0.72rem;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.18);
            font-weight: 700;
        }

        .login-symbol {
            width: 92px;
            height: 92px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #ffffff;
            font-size: 2.5rem;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .login-card {
            max-width: 430px;
            margin-left: auto;
            padding: 2rem;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.28);
            box-shadow: 0 20px 42px rgba(11, 61, 97, 0.24);
            backdrop-filter: blur(18px);
        }

        .login-card .form-label,
        .login-card h3,
        .login-card p {
            color: #ffffff;
        }

        .login-card .form-control {
            background: rgba(255, 255, 255, 0.92);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .login-card .btn-primary {
            background: #083c64;
            border-color: #083c64;
        }

        .login-card .btn-primary:hover {
            background: #062f4f;
            border-color: #062f4f;
        }

        @media (max-width: 991.98px) {
            .login-shell {
                grid-template-columns: 1fr;
                padding: 1.5rem;
            }

            .login-card {
                max-width: 100%;
                margin-left: 0;
            }
        }

    </style>

</head>

<body>

    <!-- ====================================== -->
    <!-- NAVBAR -->
    <!-- ====================================== -->

    <nav

        class="
            navbar
            navbar-expand-lg
            navbar-dark
            bg-primary
            shadow-sm
        "
    >

        <div class="container-fluid px-4">

            <a

                class="
                    navbar-brand
                    fw-bold
                "

                href="#dashboard"
            >

                <span class="brand-mark me-2">

                    <i
                        class="
                            bi
                            bi-buildings-fill
                        "
                    ></i>

                </span>

                IET City Portal

            </a>



            <div class="ms-auto">

                <button

                    class="
                    btn
                    btn-outline-light
                    btn-sm
                    px-3
                "

                    onclick="logout()"
                >

                    <i
                        class="
                            bi
                            bi-box-arrow-right
                        "
                    ></i>

                    Keluar

                </button>

            </div>

        </div>

    </nav>



    <!-- ====================================== -->
    <!-- MAIN CONTENT -->
    <!-- ====================================== -->

    <main

        class="
            container-fluid
            px-4
            py-4
        "
    >

        <div id="app-content"></div>

    </main>



    <!-- ====================================== -->
    <!-- MODAL REPORT -->
    <!-- ====================================== -->

    <div

        class="modal fade"

        id="reportModal"

        tabindex="-1"

        aria-hidden="true"
    >

        <div class="modal-dialog modal-lg">

            <div class="modal-content">

                <!-- HEADER -->

                <div
                    class="
                        modal-header
                        bg-primary
                        text-white
                    "
                >

                    <h5 class="modal-title">

                        <i
                            class="
                                bi
                                bi-pencil-square
                                me-2
                            "
                        ></i>

                        Form Laporan

                    </h5>

                    <button

                        type="button"

                        class="
                            btn-close
                            btn-close-white
                        "

                        data-bs-dismiss="modal"

                    ></button>

                </div>



                <!-- BODY -->

                <div class="modal-body">

                    <form id="reportForm">

                        <!-- TITLE -->

                        <div class="mb-3">

                            <label class="form-label">

                                Judul

                            </label>

                            <input

                                type="text"

                                id="title"

                                class="form-control"

                                required
                            >

                        </div>



                        <!-- CATEGORY -->

                        <div class="mb-3">

                            <label class="form-label">

                                Kategori

                            </label>

                            <input

                                type="text"

                                id="category"

                                class="form-control"

                                required
                            >

                        </div>



                        <!-- LOCATION -->

                        <div class="mb-3">

                            <label class="form-label">

                                Lokasi

                            </label>

                            <input

                                type="text"

                                id="location"

                                class="form-control"

                                required
                            >

                        </div>



                        <!-- DESCRIPTION -->

                        <div class="mb-3">

                            <label class="form-label">

                                Deskripsi

                            </label>

                            <textarea

                                id="description"

                                class="form-control"

                                rows="4"

                                required

                            ></textarea>

                        </div>



                        <!-- BUTTON -->

                        <div
                            class="
                                d-flex
                                justify-content-end
                                gap-2
                            "
                        >

                            <button

                                type="button"

                                class="
                            btn
                            btn-outline-secondary
                                "

                                data-bs-dismiss="modal"
                            >

                                Batal

                            </button>



                            <button

                                type="button"

                                class="
                                    btn
                                    btn-outline-primary
                                "

                                onclick="
                                    submitReport(
                                        'DRAFT'
                                    )
                                "
                            >

                                <i class="bi bi-file-earmark me-1"></i>

                                Simpan Draft

                            </button>



                            <button

                                type="button"

                                class="
                                    btn
                                    btn-primary
                                "

                                onclick="
                                    submitReport(
                                        'REPORTED'
                                    )
                                "
                            >

                                <i class="bi bi-send me-1"></i>

                                Ajukan

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>



    <!-- ====================================== -->
    <!-- BOOTSTRAP JS -->
    <!-- ====================================== -->

    <script

        src="
        https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js
        "
    ></script>



    <!-- ====================================== -->
    <!-- JS FILE -->
    <!-- ====================================== -->

    <script src="js/api.js?v=ui-refresh"></script>

    <script src="js/auth.js?v=ui-refresh"></script>

    <script src="js/app.js?v=ui-refresh"></script>

    <script src="js/router.js?v=ui-refresh"></script>

</body>

</html>
